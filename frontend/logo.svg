<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 132" width="460" height="132">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
    <linearGradient id="maneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="bgShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#FF6B35" flood-opacity="0.14"/>
    </filter>
    <filter id="glowFace" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: rounded rect, no border stroke, only shadow -->
  <rect width="460" height="132" rx="14" fill="url(#bgGrad)" filter="url(#bgShadow)"/>

  <!-- Lion group centered at (66, 66) on canvas -->
  <g transform="translate(66, 66)">

    <!-- Outer glow halo -->
    <circle cx="0" cy="0" r="52" fill="#FF6B35" opacity="0.06"/>

    <!-- Mane rays (from r=42 to r=52) -->
    <g stroke="url(#maneGrad)" stroke-width="2.8" stroke-linecap="round" opacity="0.88">
      <line x1="0" y1="-42" x2="0" y2="-52"/>
      <line x1="21" y1="-37" x2="26" y2="-45"/>
      <line x1="37" y1="-21" x2="45" y2="-26"/>
      <line x1="42" y1="0" x2="52" y2="0"/>
      <line x1="37" y1="21" x2="45" y2="26"/>
      <line x1="21" y1="37" x2="26" y2="45"/>
      <line x1="0" y1="42" x2="0" y2="52"/>
      <line x1="-21" y1="37" x2="-26" y2="45"/>
      <line x1="-37" y1="21" x2="-45" y2="26"/>
      <line x1="-42" y1="0" x2="-52" y2="0"/>
      <line x1="-37" y1="-21" x2="-45" y2="-26"/>
      <line x1="-21" y1="-37" x2="-26" y2="-45"/>
    </g>

    <!-- Mane ring -->
    <circle cx="0" cy="0" r="42" fill="#FF6B35" opacity="0.10"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.88"/>

    <!-- Face -->
    <circle cx="0" cy="0" r="29" fill="#141414"/>

    <!-- Eyes -->
    <ellipse cx="-10" cy="-7" rx="5.5" ry="5" fill="#FFD700" filter="url(#glowFace)"/>
    <ellipse cx="10" cy="-7" rx="5.5" ry="5" fill="#FFD700" filter="url(#glowFace)"/>
    <ellipse cx="-10" cy="-7" rx="2.5" ry="3.5" fill="#0D0D0D"/>
    <ellipse cx="10" cy="-7" rx="2.5" ry="3.5" fill="#0D0D0D"/>
    <circle cx="-8.5" cy="-9" r="1" fill="white" opacity="0.9"/>
    <circle cx="11.5" cy="-9" r="1" fill="white" opacity="0.9"/>

    <!-- Nose -->
    <path d="M-5 3 Q0 6.5 5 3 Q2 9 0 10 Q-2 9 -5 3Z" fill="#FF6B35"/>

    <!-- Mouth -->
    <path d="M-7 10 Q-3 14 0 12 Q3 14 7 10" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="-28" y1="2" x2="-13" y2="2" stroke="#FFD700" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>
    <line x1="-28" y1="6" x2="-13" y2="6" stroke="#FFD700" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>
    <line x1="13" y1="2" x2="28" y2="2" stroke="#FFD700" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>
    <line x1="13" y1="6" x2="28" y2="6" stroke="#FFD700" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>

    <!-- Node dots on mane tips -->
    <circle cx="0" cy="-52" r="2.5" fill="#FF6B35" opacity="0.9"/>
    <circle cx="52" cy="0" r="2.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="-52" cy="0" r="2.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="26" cy="-45" r="2" fill="#FF6B35" opacity="0.8"/>
    <circle cx="-26" cy="-45" r="2" fill="#FF6B35" opacity="0.8"/>
  </g>

  <!-- Text: DeclaraAI as one word -->
  <text x="146" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="47" font-weight="800" letter-spacing="-1">
    <tspan fill="#F5F5F5">Declara</tspan><tspan fill="#FF6B35">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="146" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#FFD700" letter-spacing="1.6" opacity="0.85">ASSISTENTE FISCAL INTELIGENTE</text>

  <!-- Decorative circuit line -->
  <g opacity="0.28">
    <line x1="146" y1="108" x2="440" y2="108" stroke="#FFD700" stroke-width="1"/>
    <circle cx="146" cy="108" r="2.5" fill="#FF6B35"/>
    <circle cx="240" cy="108" r="2" fill="#FFD700"/>
    <circle cx="340" cy="108" r="2" fill="#FFD700"/>
    <circle cx="440" cy="108" r="2.5" fill="#FF6B35"/>
    <line x1="240" y1="105" x2="240" y2="111" stroke="#FFD700" stroke-width="1"/>
    <line x1="340" y1="105" x2="340" y2="111" stroke="#FFD700" stroke-width="1"/>
  </g>
</svg>
