  <rect x="884" y="412" width="36" height="14" rx="3" fill="#0D0D0D"/>
  <text x="902" y="423" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#FF6B35">gera texto</text>

