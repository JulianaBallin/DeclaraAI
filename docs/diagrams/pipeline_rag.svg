    <text x="85" y="50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#F5F5F5">Embeddings</text>
    <text x="85" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#FF6B35">MiniLM-L12-v2</text>
    <text x="85" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#aaa">384 dims / Singleton</text>
