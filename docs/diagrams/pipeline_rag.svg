    <text x="65" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#aaa">loader.py</text>
    <text x="65" y="81" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#666">file_parsers.py</text>
