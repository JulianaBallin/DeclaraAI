    <text x="75" y="50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#F5F5F5">Chunker</text>
    <text x="75" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#FF6B35">tamanho: 600 chars</text>
    <text x="75" y="81" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#FF6B35">sobreposicao: 80 chars</text>
  </g>

  <!-- Arrow 3->4 with label above -->
  <line x1="541" y1="127" x2="578" y2="127" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrO)"/>
  <rect x="541" y="108" width="36" height="15" rx="3" fill="#0D0D0D"/>
  <text x="559" y="119" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#FF6B35">vetoriza</text>

