    <text x="59" y="26" text-anchor="middle" font-size="20">📝</text>
    <text x="59" y="47" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Prompt Builder</text>
    <text x="59" y="63" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#FFD700">contexto + query</text>
    <text x="59" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#888">rag_service.py</text>
