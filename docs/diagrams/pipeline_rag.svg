  <line x1="375" y1="608" x2="408" y2="608" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="416" y="612" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#aaa">Recuperacao vetorial</text>
  <line x1="555" y1="608" x2="588" y2="608" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="596" y="612" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#aaa">Retorno ao usuario</text>
  <rect x="860" y="594" width="105" height="26" rx="5" fill="#FF6B35" opacity="0.12" stroke="#FF6B35" stroke-width="1"/>
  <text x="912" y="611" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#FF6B35">RAG Pipeline</text>
