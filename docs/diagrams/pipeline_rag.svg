  <!-- Return arrow: Resposta -> User (bottom horizontal) -->
  <line x1="790" y1="552" x2="100" y2="552" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrO)"/>
  <rect x="350" y="540" width="240" height="15" rx="3" fill="#0D0D0D" opacity="0.9"/>
  <text x="470" y="551" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#FF6B35">retorno via API - Streamlit - Usuario</text>
  <line x1="100" y1="552" x2="100" y2="400" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend bar -->
  <rect x="28" y="592" width="945" height="30" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="55" y1="608" x2="88" y2="608" stroke="#FF6B35" stroke-width="2"/>
  <text x="96" y="612" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#aaa">Fluxo de ingestao</text>
  <line x1="215" y1="608" x2="248" y2="608" stroke="#FFD700" stroke-width="2"/>
