  <text x="870" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#888" opacity="0.8">ou via POST /ingest</text>
  <text x="870" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#555" opacity="0.8">Auto-ingest na</text>
  <text x="870" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#555" opacity="0.8">inicializacao se vazio</text>

