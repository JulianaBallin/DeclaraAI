<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#151515"/>
    </linearGradient>
    <linearGradient id="ph1fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="ph2fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.04"/>
    </linearGradient>
    <marker id="arrO" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#FF6B35"/>
    </marker>
    <marker id="arrY" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#FFD700"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="640" fill="url(#bg)"/>
  <rect width="1000" height="640" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.35"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#FFD700">Pipeline RAG - DeclaraAI</text>
  <line x1="60" y1="46" x2="940" y2="46" stroke="#FF6B35" stroke-width="1" opacity="0.45"/>

  <!-- ===== FASE 1: INGESTAO ===== -->
  <rect x="28" y="58" width="810" height="208" rx="12" fill="url(#ph1fill)" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="7,4" opacity="0.9"/>
  <rect x="44" y="50" width="146" height="20" rx="5" fill="#0D0D0D"/>
  <text x="117" y="64" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="700" fill="#FF6B35">FASE 1 - INGESTAO (offline)</text>

  <!-- Node: Documentos (x=42, w=145, h=95) -->
  <g transform="translate(42, 80)">
    <rect x="0" y="0" width="145" height="95" rx="8" fill="#1a1a1a" stroke="#FF6B35" stroke-width="2"/>
    <text x="72" y="28" text-anchor="middle" font-size="20">📄</text>
    <text x="72" y="50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#F5F5F5">Documentos</text>
    <text x="72" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#FF6B35">PDF / TXT / HTML</text>
    <text x="72" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#777">knowledge_base/</text>
  </g>

  <!-- Arrow 1->2 with label above -->
  <line x1="188" y1="127" x2="220" y2="127" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrO)"/>
  <rect x="189" y="108" width="30" height="15" rx="3" fill="#0D0D0D"/>
  <text x="204" y="119" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#FF6B35">carrega</text>

