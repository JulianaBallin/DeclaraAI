  <!-- Arrow 2->3 with label above -->
  <line x1="353" y1="127" x2="388" y2="127" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrO)"/>
  <rect x="352" y="108" width="38" height="15" rx="3" fill="#0D0D0D"/>
  <text x="371" y="119" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#FF6B35">fragmenta</text>

