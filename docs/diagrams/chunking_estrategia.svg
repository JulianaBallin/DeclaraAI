  <text x="60" y="343" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#333333">• Captura um comprovante/recibo completo em 1 chunk</text>
  <text x="60" y="361" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#333333">• Evita diluição semântica de chunks muito longos</text>
  <text x="60" y="379" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#333333">• Mantém valor, emitente e data no mesmo trecho</text>
  <text x="60" y="397" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#666666">• Equilibra precisão × recall no ChromaDB</text>

  <!-- Box Justificativa Overlap -->
