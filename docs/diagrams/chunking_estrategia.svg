  <text x="490" y="379" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#333333">• Contexto de transição entre parágrafos mantido</text>
  <text x="490" y="397" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#666666">• ~13% de sobreposição (equilíbrio padrão NLP)</text>

