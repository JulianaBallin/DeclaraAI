<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="ph1G" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="ph2G" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.03"/>
    </linearGradient>
    <marker id="aO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF6B35"/>
    </marker>
    <marker id="aY" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FFD700"/>
    </marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#50C878"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bgG)"/>
  <rect width="1000" height="560" fill="none" stroke="#FF6B35" stroke-width="1.2" opacity="0.3"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#FFD700">Pipeline de Classificação e Justificativa — DeclaraAI</text>
  <line x1="50" y1="42" x2="950" y2="42" stroke="#FF6B35" stroke-width="0.8" opacity="0.4"/>

  <!-- ===== FASE 1: CLASSIFICAÇÃO ===== -->
  <rect x="24" y="52" width="955" height="216" rx="10" fill="url(#ph1G)" stroke="#FF6B35" stroke-width="1.4" stroke-dasharray="6,3"/>
  <rect x="40" y="44" width="194" height="18" rx="4" fill="#0D0D0D"/>
  <text x="137" y="57" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FF6B35">FASE 1 — CLASSIFICAÇÃO TRIBUTÁRIA</text>

  <!-- Box: Documento Fiscal -->
  <rect x="40" y="70" width="130" height="86" rx="7" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.8"/>
  <text x="105" y="96" text-anchor="middle" font-size="18">📄</text>
  <text x="105" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Documento</text>
  <text x="105" y="131" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FF6B35">PDF/TXT/HTML</text>
  <text x="105" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">XML / JPG / PNG</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="113" x2="198" y2="113" stroke="#FF6B35" stroke-width="1.8" marker-end="url(#aO)"/>

  <!-- Box: Extração -->
  <rect x="200" y="70" width="130" height="86" rx="7" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.6"/>
  <text x="265" y="96" text-anchor="middle" font-size="18">🔎</text>
  <text x="265" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Extração</text>
  <text x="265" y="131" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FF6B35">texto + metadados</text>
  <text x="265" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">valor / data / CNPJ</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="113" x2="358" y2="113" stroke="#FF6B35" stroke-width="1.8" marker-end="url(#aO)"/>

  <!-- Box: Score por Palavras-chave -->
  <rect x="360" y="70" width="140" height="86" rx="7" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.6"/>
  <text x="430" y="96" text-anchor="middle" font-size="18">⚖️</text>
  <text x="430" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Score por</text>
  <text x="430" y="130" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Palavras-chave</text>
  <text x="430" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">8 categorias / peso</text>

  <!-- Arrow 3 -->
  <line x1="500" y1="113" x2="528" y2="113" stroke="#FF6B35" stroke-width="1.8" marker-end="url(#aO)"/>

  <!-- Box: Limiar (decisão) -->
  <rect x="530" y="70" width="130" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="2"/>
  <text x="595" y="96" text-anchor="middle" font-size="18">🔀</text>
  <text x="595" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD700">Limiar</text>
  <text x="595" y="131" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FFD700">score ≥ 4.0</text>
  <text x="595" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">margem ≥ 2.0</text>

  <!-- Arrow SIM (right from decisão) -->
  <line x1="660" y1="100" x2="718" y2="100" stroke="#50C878" stroke-width="1.8" marker-end="url(#aG)"/>
  <rect x="661" y="85" width="30" height="13" rx="3" fill="#0D0D0D"/>
  <text x="676" y="95" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#50C878">SIM</text>

  <!-- Arrow NÃO (down from decisão) -->
  <line x1="595" y1="156" x2="595" y2="194" stroke="#FF6B35" stroke-width="1.8" marker-end="url(#aO)"/>
  <rect x="598" y="165" width="30" height="13" rx="3" fill="#0D0D0D"/>
  <text x="613" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FF6B35">NÃO</text>

  <!-- Box: LLM Classificador (below decisão) -->
  <rect x="530" y="196" width="130" height="62" rx="7" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.6"/>
  <text x="595" y="220" text-anchor="middle" font-size="14">🤖</text>
  <text x="595" y="237" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#F5F5F5">LLM Fallback</text>
  <text x="595" y="251" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FF6B35">Mistral 7B / temp 0.1</text>

  <!-- Arrow LLM -> Resultado (right) -->
  <line x1="660" y1="227" x2="718" y2="156" stroke="#FF6B35" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#aO)"/>

  <!-- Box: Resultado Classificação -->
  <rect x="720" y="70" width="148" height="86" rx="7" fill="#1a1a1a" stroke="#50C878" stroke-width="2"/>
  <text x="794" y="96" text-anchor="middle" font-size="18">✅</text>
  <text x="794" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#50C878">Classificação</text>
  <text x="794" y="131" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#50C878">categoria + confiança</text>
  <text x="794" y="146" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">alta / média / baixa</text>

  <!-- ===== FASE 2: JUSTIFICATIVA ENRIQUECIDA (BÔNUS) ===== -->
  <rect x="24" y="286" width="955" height="218" rx="10" fill="url(#ph2G)" stroke="#FFD700" stroke-width="1.4" stroke-dasharray="6,3"/>
  <rect x="40" y="278" width="262" height="18" rx="4" fill="#0D0D0D"/>
  <text x="171" y="291" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD700">FASE 2 — JUSTIFICATIVA ENRIQUECIDA (BÔNUS)</text>

  <!-- Box: Dados do Doc -->
  <rect x="40" y="306" width="130" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.6"/>
  <text x="105" y="332" text-anchor="middle" font-size="18">📋</text>
  <text x="105" y="352" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Dados do Doc</text>
  <text x="105" y="367" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FFD700">categoria + conteúdo</text>
  <text x="105" y="381" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">emitente / valor</text>

  <!-- Arrow B1 -->
  <line x1="170" y1="349" x2="198" y2="349" stroke="#FFD700" stroke-width="1.8" marker-end="url(#aY)"/>

  <!-- Box: Query Otimizada -->
  <rect x="200" y="306" width="136" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.6"/>
  <text x="268" y="332" text-anchor="middle" font-size="18">🎯</text>
  <text x="268" y="352" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Query</text>
  <text x="268" y="366" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Otimizada</text>
  <text x="268" y="381" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">por categoria fiscal</text>

  <!-- Arrow B2 -->
  <line x1="336" y1="349" x2="364" y2="349" stroke="#FFD700" stroke-width="1.8" marker-end="url(#aY)"/>

  <!-- Box: Retriever RAG -->
  <rect x="366" y="306" width="136" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.6"/>
  <text x="434" y="332" text-anchor="middle" font-size="18">🔍</text>
  <text x="434" y="352" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Retriever RAG</text>
  <text x="434" y="367" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FFD700">ChromaDB + CrossEncoder</text>
  <text x="434" y="381" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">top-3 chunks</text>

  <!-- Arrow B3 -->
  <line x1="502" y1="349" x2="530" y2="349" stroke="#FFD700" stroke-width="1.8" marker-end="url(#aY)"/>

  <!-- Box: Contexto RAG -->
  <rect x="532" y="306" width="136" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.6"/>
  <text x="600" y="332" text-anchor="middle" font-size="18">📚</text>
  <text x="600" y="352" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Contexto da</text>
  <text x="600" y="366" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#F5F5F5">Base</text>
  <text x="600" y="381" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">trechos relevantes</text>

  <!-- Arrow B4 -->
  <line x1="668" y1="349" x2="696" y2="349" stroke="#FFD700" stroke-width="1.8" marker-end="url(#aY)"/>

  <!-- Box: Mistral Prompt -->
  <rect x="698" y="306" width="130" height="86" rx="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.6"/>
  <text x="763" y="332" text-anchor="middle" font-size="18">🤖</text>
  <text x="763" y="352" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD700">Mistral 7B</text>
  <text x="763" y="367" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#FFD700">temp 0.15</text>
  <text x="763" y="381" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">max 350 tokens</text>

  <!-- Arrow B5 -->
  <line x1="828" y1="349" x2="856" y2="349" stroke="#FFD700" stroke-width="1.8" marker-end="url(#aY)"/>

  <!-- Box: Justificativa Enriquecida -->
  <rect x="858" y="306" width="112" height="86" rx="7" fill="#1a1a1a" stroke="#50C878" stroke-width="2"/>
  <text x="914" y="330" text-anchor="middle" font-size="16">💡</text>
  <text x="914" y="349" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#50C878">Justificativa</text>
  <text x="914" y="363" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#50C878">Enriquecida</text>
  <text x="914" y="378" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#777">ficha + código RF</text>

  <!-- Connecting arrow: Resultado Classificação (fase1) → Dados do Doc (fase2) -->
  <line x1="794" y1="156" x2="794" y2="275" stroke="#50C878" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="794" y1="275" x2="108" y2="275" stroke="#50C878" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="108" y1="275" x2="108" y2="304" stroke="#50C878" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#aG)"/>
  <rect x="340" y="265" width="150" height="15" rx="3" fill="#0D0D0D"/>
  <text x="415" y="276" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#50C878">passa dados para fase 2</text>

  <!-- Legend -->
  <rect x="24" y="518" width="955" height="28" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="46" y1="532" x2="74" y2="532" stroke="#FF6B35" stroke-width="2"/>
  <text x="80" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#aaa">Classificação por regras</text>
  <line x1="240" y1="532" x2="268" y2="532" stroke="#FFD700" stroke-width="2"/>
  <text x="274" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#aaa">Justificativa enriquecida (bônus)</text>
  <line x1="490" y1="532" x2="518" y2="532" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="524" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#aaa">Fallback LLM</text>
  <line x1="650" y1="532" x2="678" y2="532" stroke="#50C878" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="684" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#aaa">Conexão entre fases</text>
  <rect x="860" y="520" width="110" height="20" rx="4" fill="#FF6B35" opacity="0.12" stroke="#FF6B35" stroke-width="0.8"/>
  <text x="915" y="534" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#FF6B35">DeclaraAI</text>
</svg>
