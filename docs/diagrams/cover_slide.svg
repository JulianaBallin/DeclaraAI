<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="60%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#161616"/>
    </linearGradient>
    <linearGradient id="glowOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowYellow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="55%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nodeGlowY" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur16">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="675" fill="url(#bgCover)"/>

  <!-- Ambient glow zones -->
  <ellipse cx="300" cy="340" rx="350" ry="280" fill="url(#glowOrange)" filter="url(#blur16)"/>
  <ellipse cx="950" cy="320" rx="300" ry="260" fill="url(#glowYellow)" filter="url(#blur16)"/>

  <!-- Subtle grid lines (depth) -->
  <g opacity="0.06" stroke="#FF6B35" stroke-width="0.6">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="200" y1="0" x2="200" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="800" y1="0" x2="800" y2="675"/>
    <line x1="1000" y1="0" x2="1000" y2="675"/>
  </g>

  <!-- Border frame -->
  <rect width="1200" height="675" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.35"/>
  <rect x="10" y="10" width="1180" height="655" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.15"/>

  <!-- ===== DECORATIVE NEURAL / RAG GRAPH (right side) ===== -->
  <!-- Deep dim connections first -->
  <g opacity="0.12" stroke="#FF6B35" stroke-width="1">
    <line x1="820" y1="160" x2="950" y2="240"/>
    <line x1="950" y1="240" x2="1080" y2="180"/>
    <line x1="1080" y1="180" x2="1050" y2="340"/>
    <line x1="820" y1="160" x2="860" y2="310"/>
    <line x1="860" y1="310" x2="1050" y2="340"/>
    <line x1="950" y1="240" x2="860" y2="310"/>
    <line x1="950" y1="240" x2="1050" y2="340"/>
    <line x1="860" y1="310" x2="920" y2="450"/>
    <line x1="1050" y1="340" x2="920" y2="450"/>
    <line x1="1080" y1="180" x2="1130" y2="300"/>
    <line x1="1130" y1="300" x2="1050" y2="340"/>
    <line x1="1130" y1="300" x2="920" y2="450"/>
  </g>
  <!-- Brighter accent connections -->
  <g opacity="0.35" stroke="#FFD700" stroke-width="1.2">
    <line x1="950" y1="240" x2="1080" y2="180"/>
    <line x1="860" y1="310" x2="1050" y2="340"/>
  </g>

  <!-- Glow halos behind nodes -->
  <circle cx="950" cy="240" r="40" fill="url(#nodeGlow)" filter="url(#blur8)"/>
  <circle cx="860" cy="310" r="30" fill="url(#nodeGlowY)" filter="url(#blur8)"/>
  <circle cx="1050" cy="340" r="30" fill="url(#nodeGlow)" filter="url(#blur8)"/>

  <!-- Network nodes -->
  <circle cx="820" cy="160" r="7" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.8"/>
  <circle cx="950" cy="240" r="12" fill="#1e1e1e" stroke="#FF6B35" stroke-width="2.2"/>
  <circle cx="1080" cy="180" r="8" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.8"/>
  <circle cx="860" cy="310" r="10" fill="#1e1e1e" stroke="#FFD700" stroke-width="2"/>
  <circle cx="1050" cy="340" r="10" fill="#1e1e1e" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="920" cy="450" r="8" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.6"/>
  <circle cx="1130" cy="300" r="7" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Center node highlight -->
  <circle cx="950" cy="240" r="4" fill="#FF6B35" opacity="0.9"/>
  <circle cx="860" cy="310" r="3" fill="#FFD700" opacity="0.9"/>

  <!-- Floating document cards (decorative) -->
  <!-- Card 1 -->
  <g transform="translate(790,480)" opacity="0.7">
    <rect width="120" height="80" rx="6" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1.2"/>
    <rect x="10" y="12" width="100" height="7" rx="2" fill="#2a2a2a"/>
    <rect x="10" y="25" width="80" height="5" rx="2" fill="#222"/>
    <rect x="10" y="36" width="90" height="5" rx="2" fill="#222"/>
    <rect x="10" y="47" width="70" height="5" rx="2" fill="#222"/>
    <text x="60" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#FF6B35" opacity="0.8">Nota Fiscal</text>
  </g>
  <!-- Card 2 -->
  <g transform="translate(1000,490)" opacity="0.6">
    <rect width="110" height="74" rx="6" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.2"/>
    <rect x="9" y="11" width="92" height="7" rx="2" fill="#2a2a2a"/>
    <rect x="9" y="24" width="72" height="5" rx="2" fill="#222"/>
    <rect x="9" y="35" width="82" height="5" rx="2" fill="#222"/>
    <rect x="9" y="46" width="60" height="5" rx="2" fill="#222"/>
    <text x="55" y="66" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#FFD700" opacity="0.8">Recibo Médico</text>
  </g>
  <!-- Card 3 -->
  <g transform="translate(1100,420)" opacity="0.5">
    <rect width="100" height="68" rx="6" fill="#1a1a1a" stroke="#FF6B35" stroke-width="1"/>
    <rect x="8" y="10" width="84" height="6" rx="2" fill="#2a2a2a"/>
    <rect x="8" y="22" width="66" height="5" rx="2" fill="#222"/>
    <rect x="8" y="33" width="74" height="5" rx="2" fill="#222"/>
    <text x="50" y="58" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#FF6B35" opacity="0.7">Informe Bancário</text>
  </g>

  <!-- ===== MAIN TITLE AREA ===== -->
  <!-- Top label -->
  <text x="90" y="145" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="400" fill="#FF6B35" letter-spacing="4" opacity="0.9">UNIVERSIDADE DO ESTADO DO AMAZONAS · 2026</text>

  <!-- DeclaraAI logotype -->
  <text x="88" y="265" font-family="'Segoe UI',Arial,sans-serif" font-size="92" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2" opacity="0.97">DeclaraAI</text>

  <!-- Subtitle line -->
  <rect x="88" y="282" width="560" height="2" rx="1" fill="url(#titleGrad)" opacity="0.6"/>

  <text x="90" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="300" fill="#ccc" letter-spacing="1">Assistente Inteligente para Declaração de IRPF</text>
  <text x="90" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="300" fill="#777" letter-spacing="0.5">Retrieval-Augmented Generation · FastAPI · ChromaDB · Mistral 7B</text>

  <!-- Tag pills -->
  <rect x="90" y="378" width="110" height="24" rx="12" fill="#FF6B35" opacity="0.15" stroke="#FF6B35" stroke-width="1"/>
  <text x="145" y="394" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#FF6B35">RAG Pipeline</text>

  <rect x="212" y="378" width="132" height="24" rx="12" fill="#FFD700" opacity="0.12" stroke="#FFD700" stroke-width="1"/>
  <text x="278" y="394" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#FFD700">Classificação Híbrida</text>

  <rect x="356" y="378" width="150" height="24" rx="12" fill="#50C878" opacity="0.12" stroke="#50C878" stroke-width="1"/>
  <text x="431" y="394" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#50C878">Justificativa por LLM+RAG</text>

  <!-- Author block -->
  <rect x="88" y="450" width="580" height="80" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="110" y="474" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#555" letter-spacing="2">EQUIPE</text>
  <text x="110" y="496" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#ccc">Juliana Ballin Lima</text>
  <text x="110" y="496" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#555" dx="180">2315310011</text>
  <text x="110" y="516" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#ccc">Fernando Luiz Da Silva Freire</text>
  <text x="110" y="516" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#555" dx="243">2315310007</text>

  <!-- Bottom bar -->
  <rect x="0" y="640" width="1200" height="35" fill="#0a0a0a"/>
  <line x1="0" y1="640" x2="1200" y2="640" stroke="#FF6B35" stroke-width="0.8" opacity="0.4"/>
  <text x="90" y="661" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555">Disciplina de RAG — UEA · 2026</text>
  <text x="1110" y="661" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#FF6B35" opacity="0.7">github.com/declaraai</text>
</svg>
